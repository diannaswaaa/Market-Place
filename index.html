<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

    <title>SWANA_MEAT</title>

    <style>
      body {
        background: #a8c69f; /* Hijau muda sage yang lebih cantik */
      }

      .effect-totop {
        transition: 0.3s;
      }
      .effect-totop:hover {
        transform: translateY(-10px);
      }

      .navbar {
        background: #0f5132; /* Hijau tua pekat */
      }

      .btn-success {
        background: #0f5132;
        border: none;
      }
      .btn-success:hover {
        background: #146c43;
      }

      /* PREMIUM CART */
      .cart-item {
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 10px;
        background: #0f5132; /* Kotak item warna hijau tua */
        color: white; /* Teks dalam kotak hijau tua jadi putih agar terbaca */
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      }

      .qty-box {
        display: flex;
        align-items: center;
        gap: 5px;
        background: rgba(255, 255, 255, 0.1);
        padding: 5px;
        border-radius: 8px;
      }

      .qty-btn {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        border: none;
        background: #1a6d44;
        color: white;
      }

      .qty-btn:hover {
        background: #238b56;
      }

      .total-box {
        background: #0f5132;
        color: white;
        padding: 15px;
        border-radius: 12px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        margin-top: 10px;
      }

      /* MODAL STYLE */
      .modal-content {
        background: #a8c69f; /* Background modal hijau muda */
        border: none;
        border-radius: 20px;
      }

      .modal-header {
        border-bottom: 1px solid rgba(15, 81, 50, 0.1);
        color: #0f5132;
      }

      .modal-footer {
        border-top: none;
      }

      .btn-secondary {
        background: #6c757d;
        border: none;
      }

      /* PRODUCT CARD */
      .card {
        border: none;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .text-success {
        color: #0f5132 !important;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="img/logo swana meat.png" class="rounded-circle bg-white me-2" style="height: 45px" />
          <span>SWANA MEAT<small style="display: block; font-size: 12px; color: #d8f3dc"> DAGING SEGAR | PILIHAN TERBAIK </small></span>
        </a>

        <input type="text" id="search" class="form-control w-50" placeholder="Cari produk..." />

        <button class="btn btn-light position-relative" data-bs-toggle="modal" data-bs-target="#cartModal">
          <i class="bi bi-cart3" style="color: #0f5132"></i>
          <span id="cart-count" class="badge bg-warning text-dark position-absolute top-0 start-100 translate-middle">0</span>
        </button>
      </div>
    </nav>

    <div class="container py-4">
      <div class="d-flex align-items-center gap-3 mb-4">
        <h2 class="text-success">Daftar Product</h2>
      </div>

      <div class="row g-4" id="produk-list">
        <div class="col-md-4 effect-totop produk">
          <div class="card">
            <img src="img/daging ayam.jpg" class="card-img-top" />
            <div class="card-body">
              <h6 class="fw-bold">Daging Ayam</h6>
              <p class="text-danger fw-bold">Rp 60.000</p>
              <button class="btn btn-success w-100 add-to-cart" data-nama="Daging Ayam" data-harga="60000"><i class="bi bi-cart-plus"></i> Tambah ke Keranjang</button>
            </div>
          </div>
        </div>
        <div class="col-md-4 effect-totop produk">
          <div class="card">
            <img src="img/daging kambing.jpg" class="card-img-top" />
            <div class="card-body">
              <h6 class="fw-bold">Daging Kambing</h6>
              <p class="text-danger fw-bold">Rp 135.000</p>
              <button class="btn btn-success w-100 add-to-cart" data-nama="Daging Kambing" data-harga="135000"><i class="bi bi-cart-plus"></i> Tambah ke Keranjang</button>
            </div>
          </div>
        </div>
        <div class="col-md-4 effect-totop produk">
          <div class="card">
            <img src="img/daging kerbau.webp" class="card-img-top" />
            <div class="card-body">
              <h6 class="fw-bold">Daging Kerbau</h6>
              <p class="text-danger fw-bold">Rp 140.000</p>
              <button class="btn btn-success w-100 add-to-cart" data-nama="Daging Kerbau" data-harga="140000"><i class="bi bi-cart-plus"></i> Tambah ke Keranjang</button>
            </div>
          </div>
        </div>
        <div class="col-md-4 effect-totop produk">
          <div class="card">
            <img src="img/daging kuda.jpg" class="card-img-top" />
            <div class="card-body">
              <h6 class="fw-bold">Daging Kuda</h6>
              <p class="text-danger fw-bold">Rp 165.000</p>
              <button class="btn btn-success w-100 add-to-cart" data-nama="Daging Kuda" data-harga="165000"><i class="bi bi-cart-plus"></i> Tambah ke Keranjang</button>
            </div>
          </div>
        </div>
        <div class="col-md-4 effect-totop produk">
          <div class="card">
            <img src="img/daging sapi.jpg" class="card-img-top" />
            <div class="card-body">
              <h6 class="fw-bold">Daging Sapi</h6>
              <p class="text-danger fw-bold">Rp 120.000</p>
              <button class="btn btn-success w-100 add-to-cart" data-nama="Daging Sapi" data-harga="120000"><i class="bi bi-cart-plus"></i> Tambah ke Keranjang</button>
            </div>
          </div>
        </div>
        <div class="col-md-4 effect-totop produk">
          <div class="card">
            <img src="img/daging slice.jpg" class="card-img-top" />
            <div class="card-body">
              <h6 class="fw-bold">Daging Slice</h6>
              <p class="text-danger fw-bold">Rp 30.000</p>
              <button class="btn btn-success w-100 add-to-cart" data-nama="Daging Slice" data-harga="30000"><i class="bi bi-cart-plus"></i> Tambah ke Keranjang</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="cartModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="fw-bold">Keranjang Belanja</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <ul id="cart-items" class="p-0 mb-3" style="list-style: none"></ul>
            <div class="total-box">Total: Rp <span id="total-harga">0</span></div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
            <button class="btn btn-success px-4" onclick="checkout()">Checkout Sekarang</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let cart = [];

      const cartCount = document.getElementById('cart-count');
      const cartItems = document.getElementById('cart-items');
      const totalHarga = document.getElementById('total-harga');

      function formatRupiah(angka) {
        return angka.toLocaleString('id-ID');
      }

      document.querySelectorAll('.add-to-cart').forEach((btn) => {
        btn.onclick = () => {
          let nama = btn.dataset.nama;
          let harga = parseInt(btn.dataset.harga);
          let item = cart.find((i) => i.nama === nama);

          if (item) {
            item.qty++;
          } else {
            cart.push({ nama, harga, qty: 1 });
          }
          updateCart();
        };
      });

      // SEKSI YANG DIPERBAIKI (Fungsi utuh untuk render keranjang belanja)
      function updateCart() {
        cartCount.innerText = cart.reduce((a, b) => a + b.qty, 0);
        cartItems.innerHTML = '';
        let total = 0;

        cart.forEach((item, i) => {
          let subtotal = item.harga * item.qty;
          total += subtotal;

          cartItems.innerHTML += `
            <li class="cart-item d-flex justify-content-between align-items-center">
              <div>
                <strong style="font-size: 1.1rem;">${item.nama}</strong><br>
                <small>Rp ${formatRupiah(item.harga)}</small>
              </div>

              <div class="d-flex align-items-center gap-3">
                <div class="qty-box">
                  <button class="qty-btn" onclick="kurang(${i})">-</button>
                  <span class="px-2 fw-bold">${item.qty}</span>
                  <button class="qty-btn" onclick="tambah(${i})">+</button>
                </div>
                <div class="fw-bold" style="min-width: 80px; text-align: right;">Rp ${formatRupiah(subtotal)}</div>
                <button class="btn btn-link text-white p-0" onclick="hapus(${i})">
                  <i class="bi bi-trash fs-5"></i>
                </button>
              </div>
            </li>`;
        });

        totalHarga.innerText = formatRupiah(total);
      }

      function tambah(i) {
        cart[i].qty++;
        updateCart();
      }

      function kurang(i) {
        if (cart[i].qty > 1) {
          cart[i].qty--;
        } else {
          cart.splice(i, 1);
        }
        updateCart();
      }

      function hapus(i) {
        cart.splice(i, 1);
        updateCart();
      }

      document.getElementById('search').addEventListener('keyup', function () {
        let val = this.value.toLowerCase();
        document.querySelectorAll('.produk').forEach((p) => {
          p.style.display = p.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
      });

      function checkout() {
        if (cart.length === 0) {
          alert('Keranjang kosong!');
          return;
        }

        let total = 0;
        let pesan = 'Halo, saya ingin memesan:%0A%0A';
        cart.forEach((item, i) => {
          let subtotal = item.harga * item.qty;
          total += subtotal;
          pesan += `${i + 1}. ${item.nama} (${item.qty}x) - Rp ${formatRupiah(subtotal)}%0A`;
        });
        pesan += `%0ATotal: Rp ${formatRupiah(total)}`;
        let noWA = '6281234567890';
        window.open('https://wa.me/' + noWA + '?text=' + pesan, '_blank');
        cart = [];
        updateCart();
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
