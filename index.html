<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

    <title>SWANA_MEAT</title>

    <style>
      body {
        background: #f6fff8;
      }

      .effect-totop {
        transition: 0.3s;
      }
      .effect-totop:hover {
        transform: translateY(-10px);
      }

      .logo-sm {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #0f5132, #198754);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
      }

      .logo-kotak {
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, #0f5132, #20c997);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 22px;
        font-weight: bold;
      }

      .navbar {
        background: linear-gradient(135deg, #0f5132, #198754);
      }

      .btn-success {
        background: linear-gradient(135deg, #198754, #20c997);
        border: none;
      }

      /* PREMIUM CART */
      .cart-item {
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 10px;
        background: #fff;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
      }

      .qty-box {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .qty-btn {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        border: none;
        background: #198754;
        color: white;
      }

      .qty-btn:hover {
        background: #146c43;
      }

      .total-box {
        background: linear-gradient(135deg, #198754, #20c997);
        color: white;
        padding: 12px;
        border-radius: 12px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark">
      <div class="container">
       <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="img/logo swana meat.png" class="rounded-circle bg-white me-2" style="height: 45px" />
          <span>SWANA MEAT<small style="display: block; font-size: 12px; color: #d8f3dc"> DAGING SEGAR | PILIHAN TERBAIK </small></span>
        </a>

        <input type="text" id="search" class="form-control w-50" placeholder="Cari produk..." />

        <button class="btn btn-light position-relative" data-bs-toggle="modal" data-bs-target="#cartModal">
          <i class="bi bi-cart3"></i>
          <span id="cart-count" class="badge bg-warning text-dark position-absolute top-0 start-100 translate-middle">0</span>
        </button>
      </div>
    </nav>

    <!-- PRODUK -->
    <div class="container py-4">
      <div class="d-flex align-items-center gap-3 mb-3">
        <h2 class="text-success">Daftar Product</h2>
      </div>

      <div class="row g-4" id="produk-list">
        <!-- PRODUK (tetap sama) -->
        <div class="col-md-4 effect-totop produk">
          <div class="card">
            <img src="img/daging ayam.jpg" />
            <div class="card-body">
              <h6>Daging Ayam</h6>
              <p class="text-danger fw-bold">Rp 60.000</p>
              <button class="btn btn-success w-100 add-to-cart" data-nama="Daging Ayam" data-harga="60000"><i class="bi bi-cart-plus"></i> Tambah ke Keranjang</button>
            </div>
          </div>
        </div>
        <div class="col-md-4 effect-totop produk">
          <div class="card">
            <img src="img/daging kambing.jpg" />
            <div class="card-body">
              <h6>Daging Kambing</h6>
              <p class="text-danger fw-bold">Rp 135.000</p>
              <button class="btn btn-success w-100 add-to-cart" data-nama="Daging Kambing" data-harga="135000"><i class="bi bi-cart-plus"></i> Tambah ke Keranjang</button>
            </div>
            </div>
          </div>
       
        <div class="col-md-4 effect-totop produk">
          <div class="card">
            <img src="img/daging kerbau.webp" />
            <div class="card-body">
              <h6>Daging Kerbau</h6>
              <p class="text-danger fw-bold">Rp 140.000</p>
              <button class="btn btn-success w-100 add-to-cart" data-nama="Daging Kerbau" data-harga="140000"><i class="bi bi-cart-plus"></i> Tambah ke Keranjang</button>
            </div>
            </div>
          </div>
       
        <div class="col-md-4 effect-totop produk">
          <div class="card">
            <img src="img/daging kuda.jpg" />
            <div class="card-body">
              <h6>Daging Kuda</h6>
              <p class="text-danger fw-bold">Rp 165.000</p>
              <button class="btn btn-success w-100 add-to-cart" data-nama="Daging Kuda" data-harga="165000"><i class="bi bi-cart-plus"></i> Tambah ke Keranjang</button>
            </div>
            </div>
          </div>
        
        <div class="col-md-4 effect-totop produk">
          <div class="card">
            <img src="img/daging sapi.jpg" />
            <div class="card-body">
              <h6>Daging Sapi</h6>
              <p class="text-danger fw-bold">Rp 120.000</p>
              <button class="btn btn-success w-100 add-to-cart" data-nama="Daging Sapi" data-harga="120000"><i class="bi bi-cart-plus"></i> Tambah ke Keranjang</button>
            </div>
            </div>
          </div>
        
        <div class="col-md-4 effect-totop produk">
          <div class="card">
            <img src="img/daging slice.jpg" />
            <div class="card-body">
              <h6>Daging Slice</h6>
              <p class="text-danger fw-bold">Rp 30.000</p>
              <button class="btn btn-success w-100 add-to-cart" data-nama="Daging Slice" data-harga="30000"><i class="bi bi-cart-plus"></i> Tambah ke Keranjang</button>
        </div>
      </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="cartModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5>Keranjang</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <ul id="cart-items" class="p-0 mb-3" style="list-style: none"></ul>

            <div class="total-box">Total: Rp <span id="total-harga">0</span></div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
            <button class="btn btn-success" onclick="checkout()">Checkout</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let cart = [];

      const cartCount = document.getElementById('cart-count');
      const cartItems = document.getElementById('cart-items');
      const totalHarga = document.getElementById('total-harga');

      function formatRupiah(angka) {
        return angka.toLocaleString('id-ID');
      }

      // ADD (NO DOUBLE + QTY)
      document.querySelectorAll('.add-to-cart').forEach((btn) => {
        btn.onclick = () => {
          let nama = btn.dataset.nama;
          let harga = parseInt(btn.dataset.harga);

          let item = cart.find((i) => i.nama === nama);

          if (item) {
            item.qty++;
          } else {
            cart.push({ nama, harga, qty: 1 });
          }

          updateCart();
        };
      });

      function updateCart() {
        cartCount.innerText = cart.reduce((a, b) => a + b.qty, 0);
        cartItems.innerHTML = '';
        let total = 0;

        cart.forEach((item, i) => {
          let subtotal = item.harga * item.qty;
          total += subtotal;

          cartItems.innerHTML += `
<li class="cart-item d-flex justify-content-between align-items-center">
  <div>
    <strong>${item.nama}</strong><br>
    Rp ${formatRupiah(item.harga)}
  </div>

  <div class="qty-box">
    <button class="qty-btn" onclick="kurang(${i})">-</button>
    <span>${item.qty}</span>
    <button class="qty-btn" onclick="tambah(${i})">+</button>
  </div>

  <div>Rp ${formatRupiah(subtotal)}</div>

  <button class="btn btn-danger btn-sm" onclick="hapus(${i})">
    <i class="bi bi-trash"></i>
  </button>
</li>`;
        });

        totalHarga.innerText = formatRupiah(total);
      }

      function tambah(i) {
        cart[i].qty++;
        updateCart();
      }

      function kurang(i) {
        if (cart[i].qty > 1) {
          cart[i].qty--;
        } else {
          cart.splice(i, 1);
        }
        updateCart();
      }

      function hapus(i) {
        cart.splice(i, 1);
        updateCart();
      }

      // SEARCH (tetap)
      document.getElementById('search').addEventListener('keyup', function () {
        let val = this.value.toLowerCase();
        document.querySelectorAll('.produk').forEach((p) => {
          p.style.display = p.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
      });

      // CHECKOUT WA
      function checkout() {
        if (cart.length === 0) {
          alert('Keranjang kosong!');
          return;
        }

        let total = 0;
        let pesan = 'Halo, saya ingin memesan:%0A%0A';

        cart.forEach((item, i) => {
          let subtotal = item.harga * item.qty;
          total += subtotal;

          pesan += `${i + 1}. ${item.nama} (${item.qty}x) - Rp ${formatRupiah(subtotal)}%0A`;
        });

        pesan += `%0ATotal: Rp ${formatRupiah(total)}`;

        let noWA = '6281234567890';

        window.open('https://wa.me/' + noWA + '?text=' + pesan, '_blank');

        cart = [];
        updateCart();
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
